services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # 포트를 외부에 노출하지 않음 — Docker 내부 네트워크에서만 접근 가능
    # 외부에서 :8000 직접 접근 불가 → CORS 우회 원천 차단
    expose:
      - "8000"
    env_file: .env
    environment:
      # Next.js(frontend)만 backend에 접근 가능하도록 CORS 제한
      - ALLOWED_ORIGINS=http://localhost:3000
    restart: always
    networks:
      - law-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    restart: always
    networks:
      - law-network

networks:
  law-network:
    driver: bridge
